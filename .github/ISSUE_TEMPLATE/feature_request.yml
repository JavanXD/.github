name: Feature request
description: Suggest an idea or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What problem does this solve? Who benefits?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you'd like to see
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about
    validations:
      required: false
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: How large do you think this change is?
      options:
        - Small — tweak or polish
        - Medium — new behavior, contained change
        - Large — architecture or multi-repo impact
    validations:
      required: true
  - type: checkboxes
    id: volunteer
    attributes:
      label: Contribution
      options:
        - label: I am willing to open a PR for this
