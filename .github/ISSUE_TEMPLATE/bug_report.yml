name: Bug report
description: Something is broken or behaves incorrectly
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. If this is a **security vulnerability**, close this issue and follow [SECURITY.md](https://github.com/JavanXD/.github/blob/main/SECURITY.md) instead.
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Tag, release, or commit SHA where you observed the bug
      placeholder: e.g. v1.2.0 or abc1234
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, runtime, or deployment context
      placeholder: e.g. macOS 15, Chrome 136, Node 22
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant output. Redact secrets.
    validations:
      required: false
